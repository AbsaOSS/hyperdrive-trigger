# How will users authenticate. Available options: inmemory, ldap
auth.mechanism=inmemory
environment=TEST

# INMEMORY authentication: username and password defined here will be used for authentication.
auth.inmemory.user=user
auth.inmemory.password=password

appUniqueId=9c282190-4078-4380-8960-ce52f43b94fg

scheduler.sensors.changedSensorsChunkQuerySize=100

shellExecutor.executablesFolder=src/test/resources/

sparkYarnSink.executablesFolder=src/test/resources/

kafkaSource.group.id.prefix=hyper_drive
kafkaSource.properties.security.protocol=PLAINTEXT
kafkaSource.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
kafkaSource.optionalString=abcd
#kafkaSource.keyDeserializer=org.apache.kafka.common.serialization.StringDeserializer
sparkYarnSink.hadoopResourceManagerUrlBase=http://localhost:8088

notification.sender.address=sender <sender@abc.com>
notification.enabled=true
spring.mail.host=
spring.mail.port=

db.connectionPool=disabled
db.url=jdbc:h2:mem:hyperdriver;INIT=create domain if not exists JSONB as text;MODE=PostgreSQL;DATABASE_TO_UPPER=false
db.driver=org.h2.Driver
db.keepAliveConnection=true
spring.liquibase.change-log=classpath:/db_scripts/liquibase/db.changelog.yml

kafkaSource.properties.enable.auto.commit=false
kafkaSource.properties.auto.offset.reset=latest
kafkaSource.properties.ssl.truststore.location=truststore.jks
kafkaSource.properties.ssl.truststore.password=password
kafkaSource.properties.ssl.keystore.location=keystore.jks
kafkaSource.properties.ssl.keystore.password=password
kafkaSource.properties.ssl.key.password=password
kafkaSource.properties.sasl.kerberos.service.name=kafka
kafkaSource.properties.sasl.mechanism=GSSAPI
kafkaSource.properties.sasl.jaas.config=keyTab="user.keytab" serviceName="kafka" principal="principal";
kafkaSource.properties.client.dns.lookup=resolve_canonical_bootstrap_servers_only
kafkaSource.properties.abc=def